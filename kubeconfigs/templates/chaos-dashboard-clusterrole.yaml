apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-chaos-dashboard
  namespace: chaos-mesh
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-chaos-dashboard-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: sre-chaos-dashboard
    namespace: chaos-mesh
