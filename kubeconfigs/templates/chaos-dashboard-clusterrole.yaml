apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-chaos-dashboard
  namespace: chaos-mesh
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-chaos-dashboard
rules:
  # Read-only core resources
  - apiGroups: [""]
    resources: ["pods", "events", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  # Full access to chaos-mesh resources
  - apiGroups: ["chaos-mesh.org"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-chaos-dashboard-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sre-chaos-dashboard
subjects:
  - kind: ServiceAccount
    name: sre-chaos-dashboard
    namespace: chaos-mesh
