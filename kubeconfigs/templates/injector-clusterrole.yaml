apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-injector
rules:
  # 读权限（同 readonly）
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "configmaps", "namespaces", "events", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  # 注入权限：可以 patch/update deployments 和 pods
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  # Chaos Mesh 资源
  - apiGroups: ["chaos-mesh.org"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-injector
  namespace: seat-1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-injector-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sre-injector
subjects:
  - kind: ServiceAccount
    name: sre-injector
    namespace: seat-1
