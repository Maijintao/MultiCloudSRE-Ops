apiVersion: apps/v1
kind: Deployment
metadata:
  name: shippingservice
  namespace: seat-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shippingservice
  template:
    metadata:
      labels:
        app: shippingservice
    spec:
      containers:
      - env:
        - name: PORT
          value: "50051"
        - name: DISABLE_PROFILER
          value: "1"
        image: registry.k8s.io/shippingservice:v0.10.5
        imagePullPolicy: IfNotPresent
        name: server
        ports:
        - containerPort: 50051
          protocol: TCP
        livenessProbe:
          failureThreshold: 3
          grpc:
            port: 50051
            service: ""
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        readinessProbe:
          failureThreshold: 3
          grpc:
            port: 50051
            service: ""
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
