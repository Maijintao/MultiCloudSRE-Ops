apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: new-notificationservice
  name: new-notificationservice
  namespace: seat-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: new-notificationservice
  template:
    metadata:
      labels:
        app: new-notificationservice
    spec:
      containers:
      - env:
        - name: PORT
          value: "5072"
        - name: EMAIL_SERVICE_ADDR
          value: "__TENCENT_IP__:30010"
        image: docker.io/library/new-notificationservice:v1.0
        imagePullPolicy: Never
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 5072
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: server
        ports:
        - containerPort: 5072
          protocol: TCP
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
