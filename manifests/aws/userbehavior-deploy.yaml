apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: new-userbehaviorservice
  name: new-userbehaviorservice
  namespace: seat-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: new-userbehaviorservice
  template:
    metadata:
      labels:
        app: new-userbehaviorservice
    spec:
      containers:
      - env:
        - name: PORT
          value: "5074"
        - name: RISK_CONTROL_SERVICE_ADDR
          value: new-riskcontrolservice:5071
        - name: NOTIFICATION_SERVICE_ADDR
          value: new-notificationservice:5072
        - name: CURRENCY_SERVICE_ADDR
          value: "__TENCENT_IP__:30009"
        - name: EMAIL_SERVICE_ADDR
          value: "__TENCENT_IP__:30010"
        - name: PRODUCT_CATALOG_SERVICE_ADDR
          value: "__TENCENT_IP__:30008"
        image: docker.io/library/new-userbehaviorservice:v1.0
        imagePullPolicy: Never
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 5074
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: server
        ports:
        - containerPort: 5074
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 5074
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
