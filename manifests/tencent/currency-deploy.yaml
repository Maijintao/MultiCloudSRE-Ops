apiVersion: apps/v1
kind: Deployment
metadata:
  name: currencyservice
  namespace: seat-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: currencyservice
  template:
    metadata:
      labels:
        app: currencyservice
    spec:
      containers:
      - env:
        - name: DISABLE_PROFILER
          value: "1"
        - name: PORT
          value: "7000"
        image: registry.k8s.io/currencyservice:v0.10.5
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - /bin/true
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: server
        ports:
        - containerPort: 7000
          protocol: TCP
        readinessProbe:
          exec:
            command:
            - /bin/true
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
